# Copyright 2025, 2026 Query Farm LLC - https://query.farm
#
# CI for @query-farm/vgi.
#
# Two jobs:
#   unit        — pure TypeScript: build + `bun test` + Arrow facade parity.
#                 No DuckDB / vgi extension needed. Fast, always runs.
#   integration — the C++ sqllogictest suite from the Query-farm/vgi repo, run
#                 against the bun example workers through ci/run-integration.sh
#                 — the same harness vgi-go and vgi-python use. See ci/README.md.
#
# ── Why the integration job no longer calls `make test-http` ─────────────────
# It used to, with LOCAL_EXTENSION_REPO pointed at the community repo *globally*.
# `vgi` is not autoloadable so it installed fine from there; `httpfs` IS
# autoloadable, so DuckDB's CheckRequire took the autoinstall branch and issued
# `INSTALL httpfs FROM '<community repo>'`, which 404s. A failed `require` is a
# silent SKIP_TEST, and vgi/scripts/run_tests.py has no skipped category at all
# (`passes = [r for r in results if r["exit"] == 0]`, and DuckDB exits 0 on a
# skip). Result: 261 of 286 test cases skipped while this job reported
# "passed: 280" in 84 seconds. ci/run-integration.sh scopes the community repo
# to `vgi` alone, takes every other extension FROM core, and — the part that
# makes it stay fixed — counts skips, names them, fails on any skip that is not
# in its expected-skip allowlist, and enforces a floor on executed test cases.
#
# Excluded tests are NOT listed here: ci/run-integration.sh owns that list, with
# the reason for each, so the exclusions live next to the harness that applies
# them instead of being split across a Makefile and a workflow env var.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit (bun test + build + parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (types + bundles)
        run: bun run build

      - name: Unit tests
        run: bun test

      - name: Arrow facade parity (arrow-js + flechette)
        run: make test-facade-parity

  integration:
    # Lanes run independently (fail-fast: false) so a regression in one is never
    # masked by another. The plain subprocess transport is deliberately absent:
    # it pays a bun cold start per test and thrashes CI's 2-core runners.
    name: "Integration (${{ matrix.lane }} — ${{ matrix.backend }})"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # The whole suite over the stateless HTTP transport, per Arrow backend.
          - { lane: http, backend: arrow-js, conditions: '' }
          # VGI_BUN_CONDITIONS=flechette selects the flechette backend while
          # keeping @query-farm/vgi-rpc in Node mode (the broad `worker`
          # condition also flips vgi-rpc to its browser build and drops
          # tcpConnect, breaking the Node HTTP worker). flechette is HTTP-only —
          # no stdio incremental streaming — so it has no launch lane.
          - { lane: http, backend: flechette, conditions: flechette }
          # The AF_UNIX launcher transport (the repo's default `make test`). One
          # warm bun worker serves the whole run, so it is the *fastest* lane,
          # and it covers what http structurally cannot: the launcher-only tests
          # and the four subprocess-pool-semantics files.
          - { lane: launch, backend: arrow-js, conditions: '' }
    steps:
      - name: Checkout vgi-typescript
        uses: actions/checkout@v4

      - name: Checkout Query-farm/vgi (supplies test/sql/integration)
        uses: actions/checkout@v4
        with:
          repository: Query-farm/vgi
          path: vgi-upstream
          # Pin to the tag matching the published extension when you cut
          # releases; main is fine while tracking head.
          ref: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Resolve the latest haybarn release so the unittest host matches the
      # rebuilt community vgi extension's DuckDB ABI. A stale pin SIGSEGVs on
      # load. Mirrors the vgi-go / vgi-python integration jobs.
      - name: Resolve latest haybarn release
        run: |
          REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
          echo "HAYBARN_RELEASE=$REL" >> "$GITHUB_ENV"
          echo "Latest haybarn release: $REL"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download haybarn-unittest
        run: |
          gh release download "$HAYBARN_RELEASE" \
            --repo Query-farm-haybarn/haybarn \
            --pattern 'haybarn_unittest-linux-amd64.zip' \
            --output /tmp/haybarn-unittest.zip --clobber
          unzip -o -q /tmp/haybarn-unittest.zip -d /tmp/haybarn-unittest
          UNITTEST=$(find /tmp/haybarn-unittest -name 'haybarn-unittest' -type f | head -1)
          chmod +x "$UNITTEST"
          echo "HAYBARN_UNITTEST=$UNITTEST" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ github.token }}

      # The harness stages a rewritten copy of the suite, boots the example HTTP
      # workers, warms the extension cache (FORCE INSTALL vgi FROM community;
      # everything else FROM core), runs one unittest invocation, and then
      # enforces the skip contract: every skip must match an expected reason and
      # at least MIN_EXECUTED test cases must actually execute. Note that
      # LOCAL_EXTENSION_REPO is deliberately NOT set anywhere in this file.
      - name: Integration suite (${{ matrix.lane }} / ${{ matrix.backend }})
        run: ci/run-integration.sh
        env:
          VGI_SRC: ${{ github.workspace }}/vgi-upstream
          TRANSPORT: ${{ matrix.lane }}
          VGI_BUN_CONDITIONS: ${{ matrix.conditions }}
