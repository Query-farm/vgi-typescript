# Coverage config is inert unless coverage is enabled (via `bun test --coverage`
# or the `test:coverage` script). Normal `bun test` / `make test-client` runs are
# unaffected. Coverage here reflects the IN-PROCESS bun:test suites only — the
# DuckDB-driven subprocess integration tests run the worker in a separate Bun
# process that Bun cannot instrument (it ignores NODE_V8_COVERAGE), so worker.ts
# and the serializers read low. See CLAUDE.md.
[test]
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true

# Ratchet floor: set just below the current baseline (47.70% lines / 40.27%
# funcs as of 2026-06-02). CI fails if coverage drops below this. Raise it as
# in-process coverage improves; do not lower it.
coverageThreshold = { line = 0.45, function = 0.38 }
